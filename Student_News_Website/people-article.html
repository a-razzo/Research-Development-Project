<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="mainstyles.css">
  <script src="image-disclaimer.js" defer></script>
  <title>EH News - People Feature</title>
</head>
<body>
  <header class="page-header">
    <div class="header-content">
      <a class="site-logo" href="index.html">EH News</a>
      <nav class="main-navigation">
        <a href="events.html">Events</a>
        <a class="active" href="people.html">People</a>
        <a href="technology.html">Technology</a>
      </nav>
    </div>
  </header>

  <main class="article-page-wrapper">
    <article class="article-container">
      <section class="article-hero-link">
        <img id="article-hero-image" class="article-hero-image" src="images/historic3.png" alt="People feature hero image">
        <div class="article-hero-text">
          <p id="article-hero-kicker" class="article-category-label">People Feature</p>
          <h1 id="event-hero-title">Loading article...</h1>
        </div>
      </section>

      <div class="article-body">
        <h2 id="event-summary-heading" class="article-info-table-title">The Summary</h2>

        <div class="article-info-table-wrapper">
          <table class="article-info-table">
            <thead id="event-summary-head"></thead>
            <tbody id="event-summary-body"></tbody>
          </table>
        </div>

        <p id="article-summary" class="article-summary"></p>

        <section id="article-main-content" class="article-main-content"></section>
      </div>
    </article>
  </main>

  <footer class="page-footer">
    <div class="footer-content">
      <p class="footer-brand">EH News - Edge Hill News</p>
      <nav>
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="people.html">People</a>
        <a href="technology.html">Technology</a>
      </nav>
      <p class="copyright">&copy; 2026 EH News. All rights reserved.</p>
    </div>
  </footer>

  <script>
    async function loadPeopleArticle() {
      try {
        const response = await fetch('articles/people-article.json');
        if (!response.ok) {
          throw new Error('Failed to load article JSON');
        }

        const data = await response.json();

        document.title = `EH News - ${data.title}`;

        const heroImage = document.getElementById('article-hero-image');
        const heroKicker = document.getElementById('article-hero-kicker');
        const heroTitle = document.getElementById('event-hero-title');
        const summaryHeading = document.getElementById('event-summary-heading');
        const summaryHead = document.getElementById('event-summary-head');
        const summaryBody = document.getElementById('event-summary-body');
        const abstractEl = document.getElementById('article-summary');
        const mainContent = document.getElementById('article-main-content');

        heroImage.src = data.hero.image.src;
        heroImage.alt = data.hero.image.alt;
        heroKicker.textContent = data.hero.kicker;
        heroTitle.textContent = data.title;

        summaryHeading.textContent = data.summary.heading;

        const headerRow = document.createElement('tr');
        data.summary.headers.forEach((headerText) => {
          const th = document.createElement('th');
          th.scope = 'col';
          th.textContent = headerText;
          headerRow.appendChild(th);
        });
        summaryHead.appendChild(headerRow);

        data.summary.rows.forEach((rowData) => {
          const tr = document.createElement('tr');
          rowData.forEach((cellText) => {
            const td = document.createElement('td');
            td.textContent = cellText;
            tr.appendChild(td);
          });
          summaryBody.appendChild(tr);
        });

        abstractEl.textContent = data.abstract;

        const introParagraph = document.createElement('p');
        introParagraph.className = 'article-intro-paragraph';
        introParagraph.innerHTML = data.intro;
        mainContent.appendChild(introParagraph);

        data.sections.forEach((section) => {
          const split = document.createElement('div');
          split.className = section.reverse ? 'article-split-row reverse' : 'article-split-row';

          const figure = document.createElement('figure');
          figure.className = 'article-inline-image';

          const image = document.createElement('img');
          image.src = section.image.src;
          image.alt = section.image.alt;
          figure.appendChild(image);

          const textBox = document.createElement('div');
          textBox.className = 'article-text-box';

          section.paragraphs.forEach((paragraphHtml) => {
            const paragraph = document.createElement('p');
            paragraph.innerHTML = paragraphHtml;
            textBox.appendChild(paragraph);
          });

          split.appendChild(figure);
          split.appendChild(textBox);
          mainContent.appendChild(split);
        });
      } catch (error) {
        document.getElementById('event-hero-title').textContent = 'Unable to load article content.';
      }
    }

    loadPeopleArticle();
  </script>
</body>
</html>
