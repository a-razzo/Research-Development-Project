version: '3.8'

services:
  poll-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poll-backend
    ports:
      - "5000:5000"
    volumes:
      - poll-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  poll-data:
    driver: local
